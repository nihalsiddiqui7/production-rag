services:

  app:
    build: .
    container_name: production-rag-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - redis

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: production-rag-redis

    ports:
      - "6379:6379"

    restart: unless-stopped